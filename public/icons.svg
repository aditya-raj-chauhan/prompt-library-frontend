<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>PromptLibrary logo — letter P mark</title>
  <desc>A minimal black and white logo mark for PromptLibrary featuring a geometric letter P with a circular counter and wordmark below.</desc>

  <!-- outer container square -->
  <rect x="290" y="60" width="100" height="100" rx="20" fill="#0d0d0d"/>

  <!-- P stem -->
  <rect x="308" y="78" width="12" height="64" rx="3" fill="#ffffff"/>

  <!-- P bowl -->
  <path d="M318 78 L338 78 Q358 78 358 98 Q358 118 338 118 L318 118 Z" fill="#ffffff"/>

  <!-- P counter (negative space circle) -->
  <circle cx="344" cy="98" r="9" fill="#0d0d0d"/>

  <!-- wordmark -->
  <text x="340" y="195"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17"
    font-weight="500"
    letter-spacing="0.04em"
    fill="#0d0d0d">PromptLibrary</text>

  <!-- tagline -->
  <text x="340" y="214"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="0.12em"
    fill="#888888">AI PROMPT COMMUNITY</text>
</svg>